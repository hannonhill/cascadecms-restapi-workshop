<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">

<head>
    <title>Exercise B5: Sites Management</title>
    <link rel="stylesheet" href="../../styles.css" />
    <script src="../../creds.js"></script>
    <script src="../../cascade-restapi.js"></script>
</head>

<body>
    <div>
        <h1>Exercise B5: Sites Management</h1>
        <p>Open your dev tools by inspecting the page. Then navigate to the console to follow along with the exercise.</p>
        <h2 style="display:inline">Sites. </h2><span>Select the site(s) you'd like to update.</span><br /><br />
        <select name="sites" id="sites" multiple="" style="resize: both; width: 90%; height: 100px;"></select><br /><br />
        <button onclick="schedulePublishing(true)">Schedule Publishing</button>
        <button onclick="schedulePublishing(false)">Disable Publishing</button>
        <button onclick="copyAssetFactory()">Copy Asset Factory</button>
        <!-- Log some stuff here -->
        <hr style="margin: 30px 0;" />
        <h2>Results</h2>
        <div id="messages"></div>
    </div>

    <script>
        /* Exercise B5: A tool to help you make sweeping changes across all your sites! */

        /* Step 1: Output the site name for the <select> option text and value (lines 49-50) */
        /* Step 2: Fill in the missing schedulePublishing fields (lines 82-96)
                   Hint: Fill out the information you desire in your site publish scheduling, then look at the read response to figure out what to fill in */
        /* Step 2: Fill in the missing copyAssetFactory fields (lines 153-162)
                   Hint: You may have to check entityTypeString in the documentation to find the right types! */
        /* Step 3: Save, open file in browser, select your site and push a button! */
        /* Step 4: Check if your AF copied successfully, and if the scheduled publishing settings updated in Cascade! */
        /* Bonus Exercise: Check if AF already exists before copying */
        /* Additional Improvements: Create a field to enter the asset factory ID and replace the hardcoded value with what is in the text field
                                    Create a field to fill in the days/time to schedule the publishing
                                    Update to use "Publish to selected Destinations */

        const sitesSelect = document.getElementById("sites");
        const results = document.getElementById("messages");

        (async () => {
            try {
                const result = await listSites({});
                console.log("List Sites response:", result);
                const sites = result.apiReturn.sites;
                for (const site of sites) { // Loop over the sites
                    const option = document.createElement("option");
                    option.text = site.path.path; // Step 1: fill in
                    option.value = site.path.path; // Step 1: fill in
                    sitesSelect.add(option);
                }
                results.innerHTML += "<p>✓ " + sitesSelect.options.length + " site(s) loaded!</p>";
            } catch (error) {
                console.log("List sites error:", error);
            }
        })();

        function getSelectedSites() {
            const selectedSites = [];
            for (let i = 0; i < sitesSelect.options.length; i++) {
                if (sitesSelect.options[i].selected) {
                    selectedSites.push(sitesSelect.options[i].value);
                }
            }
            if (selectedSites.length == 0) {
                results.innerHTML += "<p>x No sites selected!!!</p>";
            }
            return selectedSites;
        }

        async function schedulePublishing(enablePublishing) {
            const publishDays = ["Monday", "Saturday"]; // The days to publish on
            const baseTime = "00:00:00.000-05:00"; // The time to start publishing at

            const selectedSites = getSelectedSites();
            if (!selectedSites.length) return;
            results.innerHTML += '<p><strong>Starting site scheduled publishing for selected sites...</strong></p>';

            let completed = 0;
            for (let index = 0; index < selectedSites.length; index++) {
                const siteName = selectedSites[index];
                try {
                    const result = await readAsset({ // Read the site
                        path: "", // Step 2: fill in
                        type: "" // Step 2: fill in
                    });
                    console.log("Read site response:", result);

                    const site = result.apiReturn.asset.site;

                    site.usesScheduledPublishing = enablePublishing;

                    if (enablePublishing) {
                        site.publishDaysOfWeek = ""; // Step 2: fill in
                        site.scheduledPublishDestinationMode = ""; // Step 2: fill in (use "Publish to all enabled Destinations" option)

                        const publishTime = addMinutesToTime(baseTime, index * 10); // Stagger publish times by 10 minutes to avoid overloading the system with all sites publishing at once
                        site.timeToPublish = ""; // Step 2: fill in
                    }

                    const editResult = await editAsset({ // Edit the site
                        asset: result.apiReturn
                    });
                    results.innerHTML += '<p>Scheduled publishing ' + (enablePublishing ? 'enabled' : 'disabled') + ' for ' + siteName + (enablePublishing ? ' at ' + publishTime : '') + '</p>';
                    completed++;
                    if (completed === selectedSites.length) {
                        results.innerHTML += '<p><strong>✓ Done updating scheduled publishing for all selected sites.</strong></p>';
                    }
                } catch (error) {
                    console.log("Site error:", error);
                }
            }
        }

        // Calculate new time for each publish
        function addMinutesToTime(timeStr, minutesToAdd) {
            // timeStr: "HH:mm:ss.SSS-05:00"
            const timePart = timeStr.split("-")[0];
            const tzPart = "-" + timeStr.split("-")[1];
            const parts = timePart.split(":");
            let hour = parseInt(parts[0], 10);
            let min = parseInt(parts[1], 10);
            const secMs = parts[2];
            min += minutesToAdd;
            while (min >= 60) { min -= 60; hour += 1; }
            while (hour >= 24) { hour -= 24; }
            const newTime = (hour < 10 ? "0" : "") + hour + ":" + (min < 10 ? "0" : "") + min + ":" + secMs + tzPart;
            return newTime;
        }

        async function copyAssetFactory() {
            const assetFactoryPath = "Buttons";

            const selectedSites = getSelectedSites();
            if (!selectedSites.length) return;
            results.innerHTML += '<p><strong>Starting Asset Factory copy to selected sites...</strong></p>';

            let completed = 0;
            for (const siteName of selectedSites) {
                try {
                    const result = await copyAsset({
                        path: "", // Step 3: fill in
                        siteName: "CUC26 Web Services Essentials Workshop - Presentation",
                        type: "", // Step 3: fill in
                        copyParameters: {
                            destinationContainerIdentifier: { // This is the location you are copying to
                                path: {
                                    path: "/",
                                    siteName: siteName
                                },
                                type: "" // Step 3: fill in
                            },
                            "newName": assetFactoryPath
                        }
                    });
                    results.innerHTML += '<p>Asset Factory copied to ' + siteName + '</p>';
                    completed++;
                    if (completed === selectedSites.length) {
                        results.innerHTML += '<p><strong>✓ Done copying Asset Factory to all selected sites.</strong></p>';
                    }
                } catch (error) {
                    console.log("Copy error:", error);
                }
            }
        }
    </script>
</body>

</html>
