<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">

<head>
    <script src="../../creds.js"></script>
    <script src="../../cascade-restapi.js"></script>
</head>

<body>
    <div>
        <h1>Exercise B) 02-2: Create from Base Asset</h1>
    </div>

    <script>
        /* Exercise B) 02-2: Create an asset by copying the Interior page base asset and editing the copy */

        // To create an asset from another asset (like a base asset) we copy an asset, read the copy then edit the copy
        // We'll set up some VARS to make things easier down the road!

        /* Step 1: Locate the Interior page base asset (/_cms/base-assets/interior) in the Presentation site and add the asset ID (line 30) */
        /* Step 2: Add a new system name for the new page we will be creating (line 31) */
        /* Step 3: Add the folder path for where the new page should be created (line 32) */
        /* Step 4: Modify at least one field on the page, such as the title (line 63+) */
        /* Step 5: Save, open file in browser, view console log */
        /* Step 6: Check out your copied asset in Cascade! */
        /* Bonus Exercise: Modify some additional content, like the first content row WYSIWYG content or banner image */
        /* Note: Don't forget that copying again with the same name will append a number to the system name */

        var assetType = "page";
        var baseAssetID = ""; // Step 1: fill in
        var newName = ""; // Step 2: fill in
        var newFolderPath = ""; // Step 3: fill in
        var newFolderSiteName = siteName; // Set in cascade-restapi.js

        // First copy the base asset using the variables above
        copyAsset({
            type: assetType,
            id: baseAssetID,
            copyParameters: {
                newName: newName,
                destinationContainerIdentifier: {
                    type: "folder",
                    path: {
                        path: newFolderPath,
                        siteName: newFolderSiteName
                    }
                }
            }
        }).then(function (result) {
            console.log("Copy response:", result);
            // Then read the page we just copied to make sure we have all of the content for editing
            readAsset({
                type: assetType,
                path: newFolderPath + "/" + newName,
                siteName: newFolderSiteName,
                // Note: The copy operation does NOT return a new asset ID so we use the same global vars that we used to create the copy to read the copy
            }).then(function (result) {
                console.log("Read response:", result);
                // Make any modifications to the page

                // Step 4: fill in
                // Hint: Refer to the edit exercise from this morning, or copy the path from the console log ;)



                // The modified asset is submitted to Cascade with an edit
                editAsset({
                    asset: result.apiReturn,
                }).then(function (result) {
                    console.log("Edit response:", result);
                }).catch(function (error) {
                    console.log("Edit error:", error);
                });
            }).catch(function (error) {
                console.log("Read error:", error);
            });
        }).catch(function (error) {
            console.log("Copy error:", error);
        });
    </script>
</body>

</html>
