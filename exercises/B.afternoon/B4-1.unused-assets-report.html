<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">

<head>
    <title>Exercise B4-1: Unused Assets Report</title>
    <link rel="stylesheet" href="../../styles.css" />
    <script src="../../creds.js"></script>
    <script src="../../cascade-restapi.js"></script>
</head>

<body>
    <div>
        <h1>Exercise B4-1: Unused Assets Report</h1>
        <p>Open your dev tools by inspecting the page. Then navigate to the console to follow along with the exercise.</p>
        <button onclick="scanSite()">Scan Site</button>
        <!-- Log some stuff here -->
        <h2>Results</h2>
        <div id="messages"></div>
    </div>

    <script>
        /* Exercise B4-1: Loop over all content in a site and get the number of relationships for each asset */

        /* Step 1: Add up the subscribers and the manual subscribers for each asset (line 57) */
        /* Step 2: Save, open file in browser, and scan site! Check the console for any errors */
        /* Bonus Exercise: In the results messages, highlight the assets that have 0 relationships */

        var results = document.getElementById("messages");

        async function scanSite() {
            results.innerHTML += "<p><strong>Scanning " + siteName + "</strong></p>";
            await loopFolder(root, siteName); // What happens if we don't await here?
            results.innerHTML += "<p><strong>✓ Done scanning " + siteName + "</strong></p>";
        }

        function loopFolder(path, site) {
            return readAsset({
                type: "folder",
                path: path,
                siteName: site
            }).then(function (result) {
                var folderChildren = result.apiReturn.asset.folder.children;
                // Collect all promises for children
                var childPromises = folderChildren.map(function (child) {
                    if (child.type === "folder") {
                        console.log("Looping folder:", child.path.path);
                        // Return the recursive promise
                        return loopFolder(child.path.path, site);
                    } else {
                        // Return the promise for listSubscribers
                        return listSubscribers({
                            id: child.id,
                            type: child.type,
                        }).then(function (result) {
                            console.log("List Subscribers response:", result);

                            var numberOfSubscribers = ""; // Step 1: fill in

                            results.innerHTML += "<p>" + numberOfSubscribers + " subscribers for " + child.path.path + "</p>";

                        }).catch(function (error) {
                            console.log("List subscribers error:", error);
                        });
                    }
                });
                // Wait for all children to finish
                return Promise.all(childPromises);
            }).catch(function (error) {
                console.log(error);
            });
        }
    </script>
</body>

</html>
