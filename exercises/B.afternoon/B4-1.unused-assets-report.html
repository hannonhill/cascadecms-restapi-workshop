<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">

<head>
    <title>Exercise B4-1: Unused Assets Report</title>
    <link rel="stylesheet" href="../../styles.css" />
    <script src="../../creds.js"></script>
    <script src="../../cascade-restapi.js"></script>
</head>

<body>
    <div>
        <h1>Exercise B4-1: Unused Assets Report</h1>
        <p>Open your dev tools by inspecting the page. Then navigate to the console to follow along with the exercise.</p>
        <button onclick="scanSite()">Scan Site</button>
        <!-- Log some stuff here -->
        <h2>Results</h2>
        <div id="messages"></div>
    </div>

    <script>
        /* Exercise B4-1: Loop over all content in a site and get the number of relationships for each asset */

        /* Step 1: Get the number of relationships (line 57) */
        /* Step 2: Save, open file in browser, and scan site! Check the console for any errors */
        /* Bonus Exercise: Output the number of linked and static (manual) relationships separately. */

        const results = document.getElementById("messages");

        async function scanSite() {
            results.innerHTML += "<p><strong>Scanning " + siteName + "</strong></p>";
            await loopFolder(root, siteName); // What happens if we don't await here?
            results.innerHTML += "<p><strong>✓ Done scanning " + siteName + "</strong></p>";
        }

        async function loopFolder(path, site) {
            let result;
            try {
                result = await readAsset({
                    type: "folder",
                    path: path,
                    siteName: site
                });
            } catch (error) {
                console.log(error);
                return;
            }

            const folderChildren = result.apiReturn.asset.folder.children;
            // Process children one at a time
            for (const child of folderChildren) {
                if (child.type === "folder") {
                    console.log("Looping folder:", child.path.path);
                    await loopFolder(child.path.path, site);
                } else {
                    try {
                        const relResult = await relationships({
                            id: child.id,
                            type: child.type,
                        });
                        console.log("Relationships response:", relResult);

                        const numberOfRelationships = relResult.apiReturn.relationships.length; // Step 1: fill in

                        const style = numberOfRelationships === 0 ? ' style="color: yellow;"' : '';
                        results.innerHTML += "<p" + style + ">" + numberOfRelationships + " relationships for " + child.path.path + "</p>";

                        if (numberOfRelationships > 0) {
                            let linked = 0;
                            let staticCount = 0;
                            relResult.apiReturn.relationships.forEach(element => {
                                if (element.relationshipType.includes("LINKED")) {
                                    linked++;
                                } else if (element.relationshipType.includes("STATIC")) {
                                    staticCount++;
                                }
                            });
                            results.innerHTML += "<p style='margin-left: 20px;'>" + linked + " linked, " + staticCount + " static</p>";
                        }
                    } catch (error) {
                        console.log("Relationships error:", error);
                    }
                }
            }
        }
    </script>
</body>

</html>
