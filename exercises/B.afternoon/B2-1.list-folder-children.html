<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">

<head>
    <title>Exercise B2-1: List Folder Children</title>
    <link rel="stylesheet" href="../../styles.css" />
    <script src="../../creds.js"></script>
    <script src="../../cascade-restapi.js"></script>
</head>

<body>
    <script>
        /* Exercise B2-1: Read a folder and loop over all of its children */

        /* Step 1: Complete the dot notation path to the children of the folder (line 28) */
        /* Step 2: Add the child asset's type and id to the read operation (lines 35-36) */
        /* Step 3: Save, open file in browser, view console log */
        /* Bonus Exercise: Make it a recursive function and if the child asset type is a folder, read its children as well, so you read the entire site */

        (async () => {
            let result;
            try {
                result = await readAsset({
                    type: "folder",
                    path: root, // Set in cascade-restapi.js
                    siteName: siteName // Set in cascade-restapi.js
                    // Note: If we didn't use "%252F" for the root folder path, the request would be "{URL}/read/folder/siteName//" which looks malformed
                });
                console.log("Read response:", result); // Hint: Look at this in the console log to find the path to the folder's children array
            } catch (error) {
                console.log(error);
                return;
            }

            const folderChildren = result; // Step 1: fill in

            for (const child of folderChildren) { // Loop over the folder's children

                console.log("Child asset:", child); // Hint: Look at each child in the console log to find the properties that specify the child's type and ID, which we will need to read the child asset

                try {
                    const childResult = await readAsset({ // Read each child asset to get more information about it
                        type: child, // Step 2: fill in
                        id: child, // Step 2: fill in
                    });
                    console.log("Read child asset response:", childResult);
                } catch (error) {
                    console.log(error);
                }
            }
        })();
    </script>

    <h1>Exercise B2-1: List Folder Children</h1>
    <p>Open your dev tools by inspecting the page. Then navigate to the console to follow along with the exercise.</p>
</body>

</html>
