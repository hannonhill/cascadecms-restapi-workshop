<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">

<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.1.0/papaparse.min.js"></script>
    <script src="../../creds.js"></script>
    <script src="../../cascade-restapi.js"></script>
</head>

<body>
    <script>
        /* Note: Bonus script - This script automates the creation of Cascade users by reading in list from CSV file (/csv/users.csv),
          creating individual sites and updating site access for each user.  */

          var csv = 'csv/users.csv';

        // createUsers();

        // createSites();

        // updateSiteAccess();

        function createUsers() {
            Papa.parse(csv, {
                header: true,
                download: true,
                skipEmptyLines: true,
                transformHeader: function (h) {
                    return h.toLowerCase().replace(/[\W_]+/g, "").trim();
                },
                complete: function (result) {
                    console.log(result);
                    result.data.forEach(function (user, i) {
                        setTimeout(function () {
                            console.log(user);
                            createAsset({
                                asset: {
                                    user: {
                                        authType: "normal",
                                        email: user.emailaddress.toLowerCase(),
                                        enabled: true,
                                        fullName: user.firstname + ' ' + user.lastname,
                                        groups: "Web Services",
                                        password: "cuc26-web-services",
                                        roles: "Contributor",
                                        username: user.emailaddress.toLowerCase(),
                                    }
                                }
                            }).then(function (result) {
                                console.log(result);
                            }).catch(function (error) {
                                console.log(error);
                            });
                        }, i * 400);
                    });
                }
            });
        }

        function createSites() {
            Papa.parse(csv, {
                header: true,
                download: true,
                skipEmptyLines: true,
                transformHeader: function (h) {
                    return h.toLowerCase().replace(/[\W_]+/g, "").trim();
                },
                complete: function (result) {
                    console.log(result);
                    result.data.forEach(function (user) {
                        console.log(user);
                        copySite({
                            originalSiteName: "CUC26 Web Services Essentials Workshop - Work Site",
                            newSiteName: "CUC26 Web Services Essentials Workshop - " + user.firstname + " " + user.lastname
                        }).then(function (result) {
                            console.log(result);
                        }).catch(function (error) {
                            console.log(error);
                        });
                    });
                }
            });
        }

        function updateSiteAccess() {
            Papa.parse(csv, {
                header: true,
                download: true,
                skipEmptyLines: true,
                transformHeader: function (h) {
                    return h.toLowerCase().replace(/[\W_]+/g, "").trim();
                },
                complete: function (result) {
                    console.log(result);
                    result.data.forEach(function (user) {
                        console.log(user);
                        readAsset({
                            type: "site",
                            siteName: "%2520", // have to double escape the site name to read Site by name instead of ID
                            path: "CUC26 Web Services Essentials Workshop - " + user.firstname + " " + user.lastname
                        }).then(function (result) {
                            console.log(result);
                            result.apiReturn.asset.site.roleAssignments = [{
                                "roleId": "8",
                                "roleName": "Site Administrator",
                                "users": user.emailaddress.toLowerCase(),
                            }]
                            result.apiReturn.asset.site.url = result.apiReturn.asset.site.url.replace("work-site", user.firstname.toLowerCase() + "-" + user.lastname.toLowerCase());

                            editAsset({
                                asset: result.apiReturn,
                            }).then(function (result) {
                                console.log(result);
                            }).catch(function (error) {
                                console.log(error);
                            });

                        }).catch(function (error) {
                            console.log(error);
                        });
                    });
                }
            });
        }

    </script>
</body>

</html>
