<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">

<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.1.0/papaparse.min.js"></script>
    <script src="../../creds.js"></script>
    <script src="../../cascade-restapi.js"></script>
</head>

<body>
    <script>
        /* Note: Bonus script - This script automates the creation of Cascade users by reading in list from CSV file (/csv/users.csv),
          creating individual sites and updating site access for each user.  */

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        // createUsers();

        // createSites();

        // updateSiteAccess();

        async function createUsers() {
            Papa.parse('csv/users.csv', {
                header: true,
                download: true,
                skipEmptyLines: true,
                transformHeader: (h) => {
                    return h.toLowerCase().replace(/[\W_]+/g, "").trim();
                },
                complete: async (result) => {
                    console.log(result);
                    for (const user of result.data) {
                        try {
                            console.log(user);
                            const createResult = await createAsset({
                                asset: {
                                    user: {
                                        authType: "normal",
                                        email: user.email.toLowerCase(),
                                        enabled: true,
                                        fullName: user.firstname + ' ' + user.lastname,
                                        groups: "Web Services",
                                        password: "cuc24-webservices",
                                        roles: "Contributor",
                                        username: user.email.toLowerCase(),
                                    }
                                }
                            });
                            console.log(createResult);
                        } catch (error) {
                            console.log(error);
                        }
                        await sleep(400);
                    }
                }
            });
        }

        async function createSites() {
            Papa.parse('csv/users.csv', {
                header: true,
                download: true,
                skipEmptyLines: true,
                transformHeader: (h) => {
                    return h.toLowerCase().replace(/[\W_]+/g, "").trim();
                },
                complete: async (result) => {
                    console.log(result);
                    for (const user of result.data) {
                        try {
                            console.log(user);
                            const copyResult = await copySite({
                                originalSiteName: "_WS-Master",
                                newSiteName: "WS-" + user.lastname
                            });
                            console.log(copyResult);
                        } catch (error) {
                            console.log(error);
                        }
                    }
                }
            });
        }

        async function updateSiteAccess() {
            Papa.parse('csv/users.csv', {
                header: true,
                download: true,
                skipEmptyLines: true,
                transformHeader: (h) => {
                    return h.toLowerCase().replace(/[\W_]+/g, "").trim();
                },
                complete: async (result) => {
                    console.log(result);
                    for (const user of result.data) {
                        try {
                            console.log(user);
                            const readResult = await readAsset({
                                type: "site",
                                siteName: "%2520", // have to double escape the site name to read Site by name instead of ID
                                path: "WS-" + user.lastname
                            });
                            console.log(readResult);
                            readResult.apiReturn.asset.site.roleAssignments = [{
                                "roleId": "8",
                                "roleName": "Site Administrator",
                                "users": user.email.toLowerCase(),
                            }]

                            const editResult = await editAsset({
                                asset: readResult.apiReturn,
                            });
                            console.log(editResult);
                        } catch (error) {
                            console.log(error);
                        }
                    }
                }
            });
        }

    </script>
</body>

</html>
