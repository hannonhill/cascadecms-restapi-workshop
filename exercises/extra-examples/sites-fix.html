<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">

<head>
    <title>Exercise: Sites Access Fix</title>
    <link rel="stylesheet" href="../../styles.css" />
    <script src="../../creds.js"></script>
    <script src="../../cascade-restapi.js"></script>
</head>

<body>
    <div>
        <h1>Exercise: Sites Access Fix</h1>
        <p>Open your dev tools by inspecting the page. Then navigate to the console to follow along with the exercise.</p>
        <h2 style="display:inline">Sites. </h2><span>Select the site(s) you'd like to update.</span><br /><br />
        <select name="sites" id="sites" multiple="" style="resize: both; width: 90%; height: 300px;"></select><br /><br />
        <button onclick="siteAccess(true)">Site Access</button>
        <!-- Log some stuff here -->
        <hr style="margin: 30px 0;" />
        <h2>Results</h2>
        <div id="messages"></div>
    </div>

    <script>
        /* Exercise: Update the site access on selected sites! */

        /* Step 1: Output the site name for the <select> option text and value (lines 40-41) */
        /* Step 2: Fill in the missing siteAccess fields (lines 70-71) */
        /* Step 3: Fill in the site access level you desire (read, write, none) (line 75) */
        /* Step 4: Save, open file in browser, select your site and push a button! Check in Cascade if the site access is correct */

        var sitesSelect = document.getElementById("sites");
        var results = document.getElementById("messages");

        listSites({}).then(function (result) {
            console.log("List Sites response:", result);
            var sites = result.apiReturn.sites;
            sites.forEach(function (site) { // Loop over the sites
                var option = document.createElement("option");
                option.text = site.path.path; // Step 1: fill in
                option.value = site.path.path; // Step 1: fill in
                sitesSelect.add(option);
            });
            results.innerHTML += "<p>✓ " + sitesSelect.options.length + " site(s) loaded!</p>";
        }).catch(function (error) {
            console.log("List sites error:", error);
        });

        function getSelectedSites() {
            var selectedSites = [];
            for (var i = 0; i < sitesSelect.options.length; i++) {
                if (sitesSelect.options[i].selected) {
                    selectedSites.push(sitesSelect.options[i].value);
                }
            }
            if (selectedSites.length == 0) {
                results.innerHTML += "<p>x No sites selected!!!</p>";
            }
            return selectedSites;
        }

        function siteAccess() {
            var selectedSites = getSelectedSites();
            if (!selectedSites.length) return;
            results.innerHTML += '<p><strong>Starting site access updates for selected sites...</strong></p>';

            var completed = 0;
            selectedSites.forEach(function (siteName, index) {
                readAccessRights({ // Read the site
                    path: siteName, // Step 2: fill in
                    type: "site" // Step 2: fill in
                }).then(function (result) {
                    console.log("Read site response:", result);

                    result.apiReturn.accessRightsInformation.allLevel = "write"; // Step 3: fill in

                    editAccessRights({ // Edit the site
                        accessRightsInformation: result.apiReturn.accessRightsInformation
                    }).then(function (result) {
                        console.log(result);
                        results.innerHTML += '<p>Site access updated for ' + siteName + '</p>';
                        completed++;
                        if (completed === selectedSites.length) {
                            results.innerHTML += '<p><strong>✓ Done updating site access for all selected sites.</strong></p>';
                        }
                    }).catch(function (error) {
                        console.log("Edit site error:", error);
                    });
                }).catch(function (error) {
                    console.log("Read site error:", error);
                });
            });
        }

    </script>
</body>

</html>
